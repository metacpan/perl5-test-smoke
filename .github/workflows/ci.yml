name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  PERL_VERSION: "5.42"

jobs:
  build:
    name: build prod image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # Build the prod image once for the local arch and load it so the test
      # job below can run a container from it. The runtime image is what we
      # ship; tests run inside it.
      - name: build prod image (load for local use)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: coresmoke:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Save the loaded image so the test/push jobs can reuse it without
      # rebuilding.
      - name: export image to artifact
        run: |
          docker save coresmoke:ci | gzip > /tmp/coresmoke-ci.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: coresmoke-ci-image
          path: /tmp/coresmoke-ci.tar.gz
          retention-days: 1

  test:
    name: prove + perlcritic (inside prod image)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coresmoke-ci-image
          path: /tmp

      - name: load image
        run: gunzip -c /tmp/coresmoke-ci.tar.gz | docker load

      # Run the prod image as root, install the missing build deps + develop
      # CPAN modules into /app/local, then run prove + perlcritic. The
      # container is ephemeral; nothing is saved back into the prod image.
      - name: install test-only deps and run prove + perlcritic
        run: |
          docker run --rm --user 0:0 coresmoke:ci bash -c '
            set -euo pipefail
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              build-essential libsqlite3-dev liblzma-dev libssl-dev zlib1g-dev curl > /dev/null
            cpan -T App::cpm > /dev/null
            cpm install -L /app/local --with-develop --no-test \
              --resolver=snapshot --resolver=metadb
            cd /app
            PERL5LIB=/app/local/lib/perl5:/app/lib prove -lr t/
            PERL5LIB=/app/local/lib/perl5:/app/lib /app/local/bin/perlcritic --severity 5 lib/
          '

  docker:
    name: build + scan + push (multi-arch runtime)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: lowercase repository owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: log in to ghcr
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build multi-arch (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ steps.owner.outputs.name }}/coresmoke:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: trivy scan (report-only)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.name }}/coresmoke:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
