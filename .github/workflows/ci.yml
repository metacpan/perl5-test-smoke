name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  test:
    name: prove + perlcritic
    runs-on: ubuntu-latest
    container: perl:5.42-slim
    timeout-minutes: 15
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: install build deps for XS modules
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              build-essential libsqlite3-dev liblzma-dev libssl-dev zlib1g-dev \
              ca-certificates curl

      - uses: actions/checkout@v6

      - name: install CPAN deps from cpanfile (+ develop)
        uses: perl-actions/install-with-cpm@v2
        with:
          cpanfile: cpanfile
          # Skip the snapshot resolver: install-with-cpm@v2 reaches into
          # Carton::Snapshot to validate the file, and Carton isn't on
          # the host perl tree yet at this point. The prod image still
          # gets snapshot-pinned deps via cpm in Dockerfile.base; tests
          # are happy with the latest compatible versions from metacpan.
          snapshot: false
          tests: false
          # ubuntu-latest has 4 vCPUs; 1.5x oversubscription keeps all
          # cores busy while individual workers are waiting on the
          # network or disk.
          workers: 6
          args: "--with-develop"
          # `global: true` is the action's default and what we want here:
          # we're inside an ephemeral perl:5.42-slim container, so install
          # straight into /usr/local/lib/perl5/... and /usr/local/bin/...
          # which are already on @INC and PATH. No `path: local` and no
          # PERL5LIB juggling needed.
          # We're already root inside the container; perl:5.42-slim has no
          # sudo binary, so disable the action's sudo wrapper.
          sudo: false

      - name: prove
        env:
          PERL5LIB: lib
        run: prove -lr t/

      - name: perlcritic (severity 5, fail on violation)
        env:
          PERL5LIB: lib
        run: perlcritic --severity 5 lib/

  docker:
    name: build + scan + push prod image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: lowercase repository owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: log in to ghcr
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build multi-arch (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          # Override the Dockerfile's default BASE_IMAGE (metacpan) so the
          # FROM resolves to the base image we actually publish from this
          # repo. base.yml builds and pushes coresmoke-base; ci.yml pulls
          # it here.
          build-args: |
            BASE_IMAGE=ghcr.io/${{ steps.owner.outputs.name }}/coresmoke-base:latest
          tags: ghcr.io/${{ steps.owner.outputs.name }}/coresmoke:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: trivy scan (report-only)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.name }}/coresmoke:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
