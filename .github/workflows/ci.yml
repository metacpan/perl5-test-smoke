name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  PERL_VERSION: "5.42"

jobs:
  test:
    name: prove + perlcritic
    runs-on: ubuntu-latest
    container:
      image: perl:5.42-slim
    steps:
      - name: install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
              build-essential libsqlite3-dev liblzma-dev libssl-dev zlib1g-dev curl ca-certificates
      - uses: actions/checkout@v4

      - name: install App::cpm
        run: cpan -T App::cpm

      - name: install deps
        run: cpm install -L local --with-develop --no-test --resolver=snapshot --resolver=metadb

      - name: prove
        env:
          PERL5LIB: local/lib/perl5:lib
        run: prove -lr t/

      - name: perlcritic (severity 5, fail on violation)
        env:
          PERL5LIB: local/lib/perl5:lib
        run: local/bin/perlcritic --severity 5 lib/

      - name: coverage (Devel::Cover, report-only)
        if: always()
        env:
          PERL5LIB: local/lib/perl5:lib
        run: |
          PERL5OPT='-MDevel::Cover=-silent,1' prove -lr t/ || true
          local/bin/cover -report html_minimal -outputdir cover_db || true

      - name: upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover_db/
          if-no-files-found: ignore

  docker:
    name: build + scan + push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: lowercase repository owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: log in to ghcr
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ steps.owner.outputs.name }}/coresmoke:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: trivy scan (report-only)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.name }}/coresmoke:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
