{
    db_path           => $ENV{SMOKE_DB_PATH}     // 'data/smoke.db',
    reports_dir       => $ENV{SMOKE_REPORTS_DIR} // 'data/reports',
    log_level         => $ENV{SMOKE_LOG_LEVEL}   // 'info',
    cors_allow_origin => '*',
    # Max bytes after gzip decompression (bomb guard). Default: 10_000_000 (10 MB).
    # Set to 0 to disable the limit entirely.
    # max_decompressed_size => 10_000_000,
    # Pepper for admin password hashes (Argon2id). If the DB is stolen
    # without this value the hashes are useless. Generate once, never
    # rotate without re-hashing all passwords.
    admin_secret_salt => $ENV{SMOKE_ADMIN_SALT} // 'change-me-in-production',

    # Mojolicious session secret(s). Required for signed admin cookies.
    secrets => [$ENV{SMOKE_SESSION_SECRET} // 'change-me-in-production'],

    app_name          => 'Perl 5 Core Smoke DB',
    app_version       => '2.0',
    hypnotoad => {
        listen           => ['http://*:3000'],
        workers          => 2,
        clients          => 100,
        accepts          => 100,
        graceful_timeout => 30,
        proxy            => 1,
        pid_file         => 'data/hypnotoad.pid',
    },
};
