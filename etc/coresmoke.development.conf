{
    # Development mode keeps its own SQLite file separate from
    # data/smoke.db (which is what the prod container writes to and
    # what a `make start` against a real smoker workload would
    # mutate). Populate this from a legacy pg_dump with:
    #
    #   make dev-db SRC=csdb.psql
    #
    db_path           => $ENV{SMOKE_DB_PATH}     // 'data/development.db',
    reports_dir       => $ENV{SMOKE_REPORTS_DIR} // 'data/reports',
    log_level         => 'debug',
    cors_allow_origin => '*',
    app_name          => 'Perl 5 Core Smoke DB (dev)',
    app_version       => '2.0',
    hypnotoad => {
        listen           => ['http://*:3000'],
        workers          => 2,
    },
};
