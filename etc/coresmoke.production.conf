{
    # Defaults are RELATIVE to MOJO_HOME (the repo root) so `make start`
    # works from a normal checkout on macOS / Linux without write
    # access to /. Inside the container the Dockerfile sets
    # SMOKE_DB_PATH=/data/smoke.db and SMOKE_REPORTS_DIR=/data/reports
    # via ENV, which overrides these values.
    db_path           => $ENV{SMOKE_DB_PATH}     // 'data/smoke.db',
    reports_dir       => $ENV{SMOKE_REPORTS_DIR} // 'data/reports',
    log_level         => 'info',
    cors_allow_origin => '*',
    admin_secret_salt => $ENV{SMOKE_ADMIN_SALT} // 'change-me-in-production',
    secrets => [$ENV{SMOKE_SESSION_SECRET} // 'change-me-in-production'],

    app_name          => 'Perl 5 Core Smoke DB',
    app_version       => '2.0',
    hypnotoad => {
        listen           => ['http://*:3000'],
        workers          => 2,
        clients          => 100,
        accepts          => 100,
        graceful_timeout => 30,
        proxy            => 1,
        pid_file         => 'data/hypnotoad.pid',
    },
};
